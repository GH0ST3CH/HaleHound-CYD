; ═══════════════════════════════════════════════════════════════════════════
; HaleHound-CYD PlatformIO Configuration
; ESP32-DIV HaleHound Edition for Cheap Yellow Display
; Created: 2026-02-07
; ═══════════════════════════════════════════════════════════════════════════

[platformio]
src_dir = .

[env]
build_src_filter = +<*> -<_v29_backup/>

[env:esp32-cyd]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; CYD 2.8" uses CH340 USB-Serial
upload_port = /dev/cu.usbserial-*

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DUSER_SETUP_LOADED
    -include User_Setup.h
    -Wl,--allow-multiple-definition
    -DFAILURE_HANDLING
    -DXH32S_CYD

; Required libraries
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    mikalhart/TinyGPSPlus@^1.0.3
    plerup/EspSoftwareSerial@^8.2.0
    sui77/rc-switch@^2.6.4
    kosme/arduinoFFT@^2.0.2
    nrf24/RF24@1.4.11
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    lsatan/SmartRC-CC1101-Driver-Lib@^2.5.7

; Partition scheme - need more space for this firmware
board_build.partitions = huge_app.csv

; Flash mode
board_build.flash_mode = dio
board_build.f_flash = 40000000L

; Monitor filters
monitor_filters = esp32_exception_decoder

; ═══════════════════════════════════════════════════════════════════════════
; NM-RF-Hat Build Target
; Uses GPIO 22 + GPIO 27 for both CC1101 and NRF24 (physical switch selects)
; One radio at a time — hat enforces this in hardware
; ═══════════════════════════════════════════════════════════════════════════

[env:esp32-cyd-hat]
extends = env:esp32-cyd
build_flags =
    ${env:esp32-cyd.build_flags}
    -DNMRF_HAT=1

; ═══════════════════════════════════════════════════════════════════════════
; CYD 3.5" Build Target (ESP32-3248S035C)
; Capacitive GT911 touch, ST7796 display, 320x480
; CC1101 CS moved to GPIO 26 (GPIO 27 = backlight on 3.5")
; ═══════════════════════════════════════════════════════════════════════════

[env:esp32-cyd-35]
extends = env:esp32-cyd
build_flags =
    ${env:esp32-cyd.build_flags}
    -DCYD_35=1
lib_deps =
    ${env:esp32-cyd.lib_deps}
    tamctec/TAMC_GT911@^1.0.2
